<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard - Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Ovo&family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #070B14;
            --surface-dark: rgba(7, 11, 20, 0.65);
            --primary: #00F2FE;
            --primary-glow: rgba(0, 242, 254, 0.25);
            --text-light: #F8FAFC;
            --text-muted: #94A3B8;
            --border-color: rgba(0, 242, 254, 0.15);
            --danger-red: #EF4444;
            --success-green: #00F2FE;
        }

        body { 
            font-family: 'Ovo', serif; 
            color: var(--text-light); 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative; 
            background-color: var(--bg-dark); 
            z-index: 1; 
        }

        body::before {
            content: ""; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: linear-gradient(rgba(7, 11, 20, 0.75), rgba(7, 11, 20, 0.85)), url('bg_security.jpeg');
            background-size: cover; 
            background-position: center; 
            filter: blur(8px); 
            transform: scale(1.05); 
            z-index: -1;
        }

        nav { width: 100%; padding: 15px 0; background: rgba(7, 11, 20, 0.85); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        
        .brand-logo { display: flex; align-items: center; gap: 12px; font-family: 'Inter', sans-serif; }
        .brand-logo img { width: 32px; height: auto; filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.5)); }
        .brand-logo span { font-weight: 800; font-size: 22px; color: #F8FAFC; letter-spacing: -0.5px; }
        .brand-logo span span { color: var(--primary); }

        .nav-links a { color: var(--text-muted); text-decoration: none; margin-left: 30px; font-weight: 600; font-size: 14px; font-family: 'Inter', sans-serif; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); text-shadow: 0 0 8px var(--primary-glow); }

        .main-content { max-width: 800px; width: 100%; padding: 60px 20px; box-sizing: border-box; }
        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { font-size: 46px; margin: 0 0 15px 0; letter-spacing: -1px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .hero p { font-size: 18px; color: var(--text-muted); margin: 0; font-weight: 300; font-family: 'Inter', sans-serif; }
        
        .scanner-box { 
            background: var(--surface-dark); 
            border: 1px solid var(--border-color); 
            padding: 10px; 
            border-radius: 100px; 
            display: flex; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
            transition: all 0.3s ease; 
            margin-bottom: 40px; 
        }
        .scanner-box:focus-within { border-color: var(--primary); box-shadow: 0 0 30px var(--primary-glow); }
        .scanner-box input { flex: 1; background: transparent; border: none; padding: 15px 30px; color: var(--text-light); font-size: 16px; font-family: 'Fira Code', monospace; outline: none; }
        .btn-scan { background: var(--primary); color: #000; border: none; padding: 0 35px; border-radius: 100px; font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-scan:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--primary-glow); }
        .btn-scan img { width: 18px; filter: brightness(0); }

        .terminal-log { background: rgba(0,0,0,0.7); border-radius: 12px; padding: 20px; font-family: 'Fira Code', monospace; font-size: 13px; color: var(--primary); display: none; border: 1px dashed var(--primary); text-align: left; box-shadow: inset 0 0 20px rgba(0, 242, 254, 0.1); margin-bottom: 40px; }

        .result-card { background: var(--surface-dark); border: 1px solid var(--border-color); border-radius: 24px; padding: 40px; display: none; transform: translateY(20px); opacity: 0; animation: slideUp 0.6s forwards; margin-bottom: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }
        
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .status-badge { padding: 10px 24px; border-radius: 8px; font-family: 'Inter', sans-serif; font-weight: 800; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .status-phishing { background: rgba(239,68,68,0.1); color: var(--danger-red); border: 1px solid rgba(239,68,68,0.3); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        .status-aman { background: rgba(0, 242, 254, 0.1); color: var(--success-green); border: 1px solid rgba(0, 242, 254, 0.3); box-shadow: 0 0 15px var(--primary-glow); }
        .status-error { background: rgba(148,163,184,0.1); color: var(--text-muted); border: 1px solid rgba(148,163,184,0.2); }
        
        .confidence-score { text-align: right; }
        .confidence-score span { display: block; font-family: 'Fira Code', monospace; font-size: 28px; font-weight: 800; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }
        .confidence-score small { color: var(--text-muted); font-size: 12px; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
        
        .xai-box { background: rgba(0,0,0,0.4); border-left: 4px solid var(--primary); padding: 25px; border-radius: 0 12px 12px 0; font-family: 'Inter', sans-serif; }
        .xai-box h3 { margin: 0 0 15px 0; font-size: 14px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .xai-box ul { margin: 0; padding-left: 20px; color: var(--text-light); }
        .xai-box li { margin-bottom: 10px; line-height: 1.6; font-size: 14px; }

        .btn-download { display: none; margin-top: 25px; width: 100%; padding: 14px; background: rgba(0, 242, 254, 0.05); border: 1px solid var(--primary); color: var(--primary); border-radius: 12px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; letter-spacing: 1px; transition: all 0.3s ease; text-transform: uppercase; justify-content: center; align-items: center; gap: 10px; }
        .btn-download img { width: 16px; filter: drop-shadow(0 0 5px var(--primary)); }
        .btn-download:hover { background: var(--primary-glow); box-shadow: 0 0 15px var(--primary-glow); transform: translateY(-2px); }

        .history-section { background: var(--surface-dark); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; text-align: left; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .history-section h2 { font-family: 'Inter', sans-serif; font-size: 16px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--primary); margin: 0; display: flex; align-items: center; gap: 10px; }
        .history-section h2 img { width: 20px; filter: drop-shadow(0 0 5px var(--primary)); }
        
        .btn-clear-history { background: transparent; border: 1px solid rgba(239,68,68,0.3); color: var(--danger-red); padding: 8px 16px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
        .btn-clear-history:hover { background: rgba(239,68,68,0.1); }
        
        .history-table { width: 100%; border-collapse: collapse; font-family: 'Inter', sans-serif; }
        .history-table th { padding: 12px; font-size: 11px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border-color); text-align: left; }
        .history-table td { padding: 15px 12px; font-size: 13px; border-bottom: 1px solid rgba(0, 242, 254, 0.05); }
        .hist-url { font-family: 'Fira Code', monospace; color: var(--text-light); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .hist-status-phish { color: var(--danger-red); font-weight: bold; }
        .hist-status-secure { color: var(--success-green); font-weight: bold; }

        .url-notice { font-size: 12px; color: var(--text-muted); text-align: left; padding: 0 15px; margin-top: -30px; margin-bottom: 20px; display: none; font-family: 'Fira Code', monospace; }
        .url-notice span { color: var(--primary); }

        .footer-full { width: 100%; text-align: center; padding: 25px 20px; font-size: 12px; color: rgba(0, 242, 254, 0.4); letter-spacing: 2px; font-family: 'Inter', sans-serif; border-top: 1px solid var(--border-color); background: rgba(7, 11, 20, 0.8); margin-top: 40px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="brand-logo">
            <img src="logo_safeguard.png" alt="Icon">
            <span>Safe<span>Guard</span>_</span>
        </div>
        <div class="nav-links">
            <a href="scanner.html" class="active">Scanner</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="dojo.html">Quiz</a>
            <a href="portal.html">Metodologi</a>
            <a href="vault.html">Information</a>
        </div>
    </div>
</nav>

<div class="main-content">
    <div class="hero">
        <h1>Phishing Detection</h1>
        <p>Didukung oleh algoritma C4.5 Decision Tree dan Live WHOIS Tracking.</p>
    </div>

    <div class="scanner-box">
        <input type="text" id="urlInput" placeholder="https://masukkan-url-target.com" autocomplete="off" oninput="previewNormalize(this.value)">
        <button class="btn-scan" onclick="startScanning()" id="scanBtn">
            <img src="logo_safeguard.png" alt="Scan"> START SCAN
        </button>
    </div>

    <div class="url-notice" id="urlNotice">
         URL akan dinormalisasi ke: <span id="normalizedUrl"></span>
    </div>

    <div class="terminal-log" id="terminalLog">
        <div id="logContent"></div>
    </div>

    <div class="result-card" id="resultCard">
        <div class="result-header">
            <div><div class="status-badge" id="predStatus"></div></div>
            <div class="confidence-score">
                <small>Confidence Level</small>
                <span id="predConf"></span>
            </div>
        </div>
        <div class="xai-box">
            <h3><img src="logo_safeguard.png" style="width: 16px;"> C4.5 Rule Extraction</h3>
            <ul id="rulesList"></ul>
        </div>
        <button class="btn-download" id="downloadBtn" onclick="downloadAuditReport()" style="display: none;">
            <img src="logo_safeguard.png" alt="Download"> Cetak Laporan (.PDF)
        </button>
    </div>

    <div class="history-section">
        <div class="history-header">
            <h2><img src="logo_safeguard.png" alt="History"> Recent Forensic Audit Trail</h2>
            <button class="btn-clear-history" onclick="clearHistory()">
                <i class="fa-solid fa-trash-can"></i> Clear Log
            </button>
        </div>
        <table class="history-table">
            <thead>
                <tr>
                    <th>Target URL</th>
                    <th>Classification</th>
                    <th>Confidence</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>


<script>
    let lastScanData = null;

    window.onload = function() { renderScanHistory(); };

    function previewNormalize(val) {
        const notice = document.getElementById('urlNotice');
        const normalizedSpan = document.getElementById('normalizedUrl');
        if (val && !val.startsWith('http://') && !val.startsWith('https://')) {
            notice.style.display = 'block';
            normalizedSpan.innerText = 'https://' + val;
        } else {
            notice.style.display = 'none';
        }
    }

    function startScanning() {
        const urlValue = document.getElementById('urlInput').value;
        const resultCard = document.getElementById('resultCard');
        const terminalLog = document.getElementById('terminalLog');
        const logContent = document.getElementById('logContent');
        const scanBtn = document.getElementById('scanBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        if (!urlValue) return;

        resultCard.style.display = 'none';
        downloadBtn.style.display = 'none';
        terminalLog.style.display = 'block';
        logContent.innerHTML = '';
        scanBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> PROCESSING';
        scanBtn.style.opacity = '0.7';
        document.getElementById('urlNotice').style.display = 'none';

        const finalUrl = urlValue.startsWith('http') ? urlValue : 'https://' + urlValue;

        const logs = [
            `> Initializing secure connection to ${finalUrl}...`,
            "> Extracting Domain Registrar Data via live WHOIS lookup...",
            "> Scraping Document Object Model (DOM) topography...",
            "> Processing data vector through C4.5 Decision Tree..."
        ];

        let delay = 0;
        logs.forEach((log) => {
            setTimeout(() => { logContent.innerHTML += `<div>${log}</div>`; }, delay);
            delay += 350;
        });

        setTimeout(() => {
            fetch('https://safeguard-production-d5e9.up.railway.app/api/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlValue })
            })
            .then(response => response.json())
            .then(data => {
                scanBtn.innerHTML = '<img src="logo_safeguard.png" style="width: 18px; filter: brightness(0);"> START SCAN';
                scanBtn.style.opacity = '1';
                terminalLog.style.display = 'none';

                const badge = document.getElementById('predStatus');
                const rulesList = document.getElementById('rulesList');
                rulesList.innerHTML = '';

                if (data.status === 'success') {
                    if (data.prediction === 'Phishing') {
                        badge.className = 'status-badge status-phishing';
                        badge.innerHTML = '<i class="fa-solid fa-radiation"></i> MALICIOUS DETECTED';
                    } else {
                        badge.className = 'status-badge status-aman';
                        badge.innerHTML = '<i class="fa-solid fa-shield-check"></i> SECURE SITE';
                    }
                    document.getElementById('predConf').innerText = data.confidence;
                    data.xai_rules.forEach(rule => { rulesList.innerHTML += `<li>${rule}</li>`; });

                    lastScanData = data;
                    downloadBtn.style.display = 'flex'; 

                    saveScanToLocalStorage(data.url, data.prediction, data.confidence, data.xai_rules);
                } else {
                    badge.className = 'status-badge status-error';
                    badge.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> SCAN FAILED';
                    document.getElementById('predConf').innerText = "N/A";
                    rulesList.innerHTML = `<li style="color: var(--danger-red);">${data.message}</li>`;
                }

                resultCard.style.display = 'block';
            })
            .catch(err => {
                scanBtn.innerHTML = '<img src="logo_safeguard.png" style="width: 18px; filter: brightness(0);"> START SCAN';
                scanBtn.style.opacity = '1';
                logContent.innerHTML += `<div style="color: #EF4444;">> ERROR: Connection failed. Pastikan app.py menyala.</div>`;
            });
        }, delay + 200);
    }

    function downloadAuditReport() {
        if (!lastScanData) return;
        const now = new Date();
        const timestamp = now.toLocaleString('id-ID');

        const isPhish = lastScanData.prediction === 'Phishing';

        const printWindow = window.open('', '_blank');
        
        printWindow.document.write(`
            <!DOCTYPE html>
            <html lang="id">
            <head>
                <meta charset="UTF-8">
                <title>Laporan Forensik - SafeGuard<\/title>
                <style>
                    body {
                        font-family: 'Times New Roman', Times, serif;
                        color: black;
                        line-height: 1.6;
                        font-size: 12pt;
                        padding: 20mm;
                        background: white;
                    }
                    h1 {
                        font-size: 14pt;
                        text-align: center;
                        text-transform: uppercase;
                        margin-bottom: 10mm;
                        font-weight: bold;
                    }
                    h2 {
                        font-size: 12pt;
                        margin-top: 8mm;
                        margin-bottom: 4mm;
                        text-transform: uppercase;
                        font-weight: bold;
                        page-break-after: avoid;
                    }
                    p {
                        margin-top: 0;
                        margin-bottom: 4mm;
                        text-align: justify;
                        text-indent: 10mm;
                    }
                    .no-indent { text-indent: 0 !important; }
                    table {
                        width: 100%;
                        border-collapse: collapse;
                        margin-top: 4mm;
                        margin-bottom: 5mm;
                        page-break-inside: avoid;
                    }
                    th, td {
                        border: 1px solid black;
                        padding: 8px 12px;
                        font-size: 11pt;
                        text-align: left;
                        vertical-align: middle;
                        color: black;
                        background: none !important;
                    }
                    th { font-weight: bold; }
                    ul { margin-top: 2mm; margin-bottom: 4mm; padding-left: 6mm; }
                    li { margin-bottom: 2mm; text-align: justify; }
                    .math { font-style: italic; font-weight: bold; }
                <\/style>
            <\/head>
            <body>

                <h1>
                    LAPORAN FORENSIK DIGITAL:<br>
                    AUDIT TOPOLOGI DAN KLASIFIKASI ANCAMAN URL PHISHING<br>
                    MENGGUNAKAN ENGIN KECERDASAN BUATAN DECISION TREE C4.5
                <\/h1>

                <h2>I. Ringkasan Eksekutif<\/h2>
                <p>Laporan audit forensik digital ini diterbitkan secara otomatis oleh platform SafeGuard Pro Suite v1.0 sebagai instrumen validasi keamanan terhadap endpoints atau tautan digital yang dicurigai. Melalui pendekatan Explainable Artificial Intelligence (XAI), sistem membedah dan mengekstrak vektor fitur dari komponen Document Object Model (DOM) serta registrasi domain secara seketika (real-time). Pengujian ini ditujukan untuk memberikan transparansi penuh terhadap keputusan klasifikasi yang diambil oleh model klasifikasi data.<\/p>
                <p>Model kecerdasan buatan yang melandasi proses penegakan keputusan ini mengimplementasikan algoritma Decision Tree C4.5. Model telah melalui fase pelatihan komprehensif menggunakan basis data standar internasional UCI Phishing Websites Dataset dengan total luaran 11.055 rekaman data, menghasilkan tingkat akurasi pengujian sebesar 94.71% pada porsi data uji (test set) sebesar 20%. Laporan ini berfungsi sebagai bukti formal audit siber dalam mendukung riset kewaspadaan digital.<\/p>

                <h2>II. Metadata Hasil Investigasi<\/h2>
                <p class="no-indent">Berikut merupakan rangkuman parameter teknis dan pengidentifikasi unik dari tautan yang telah diisolasi dan dianalisis oleh engin SafeGuard Pro:<\/p>
                
                <table>
                    <tr>
                        <td style="font-weight: bold; width: 35%;">Endpoint URL yang Diaudit<\/td>
                        <td style="font-family: 'Courier New', Courier, monospace; font-weight: bold; word-break: break-all;">${lastScanData.url}<\/td>
                    <\/tr>
                    <tr>
                        <td style="font-weight: bold;">Keputusan Akhir (Verdict)<\/td>
                        <td style="font-weight: bold;">${isPhish ? 'MALICIOUS DETECTED (PHISHING)' : 'SECURE SITE (LEGITIMATE)'}<\/td>
                    <\/tr>
                    <tr>
                        <td style="font-weight: bold;">Bobot Keyakinan (Confidence)<\/td>
                        <td style="font-family: 'Courier New', Courier, monospace; font-weight: bold;">${lastScanData.confidence}<\/td>
                    <\/tr>
                    <tr>
                        <td style="font-weight: bold;">Waktu Eksekusi Analisis<\/td>
                        <td>${timestamp} WIB<\/td>
                    <\/tr>
                    <tr>
                        <td style="font-weight: bold;">Metode Deteksi Core<\/td>
                        <td>Decision Tree C4.5 Inductive Logic<\/td>
                    <\/tr>
                <\/table>

                <h2>III. Ekstraksi Aturan Pohon Keputusan C4.5<\/h2>
                <p>Guna memastikan pemenuhan aspek akuntabilitas ilmiah dalam kerangka makalah penelitian, luaran pohon keputusan tidak direpresentasikan melalui simbol grafis mentah, melainkan diturunkan menjadi aturan bersyarat hierarkis formal. Berdasarkan perhitungan nilai <span class="math">Entropy<\/span> dan <span class="math">Information Gain Ratio<\/span>, alur logika yang dilewati oleh subjek analisis ini dijabarkan sebagai berikut:<\/p>
                
                <ul>
                    <li>
                        <strong>Aturan Utama (Root Node):<\/strong> Jika parameter <span class="math">SSLfinal_State<\/span> bernilai <span class="math">-1<\/span> (Menandakan sertifikat SSL/HTTPS tidak valid, kedaluwarsa, atau diterbitkan oleh Otoritas Sertifikat yang tidak tepercaya), maka engin beralih menuju node anak berikutnya.
                        <ul>
                            <li>
                                <strong>Sub-Aturan (Child Node 1):<\/strong> Di bawah kondisi SSL tidak valid, evaluasi beralih ke parameter <span class="math">URL_of_Anchor<\/span>. Jika nilai persentase tautan jangkar yang mengarah ke luar domain induk melebihi ambang batas risiko (&gt; 67%), maka probabilitas ancaman meningkat secara signifikan.
                            <\/li>
                            <li>
                                <strong>Sub-Aturan (Child Node 2):<\/strong> Parameter <span class="math">Domain_Registration_Length<\/span> dievaluasi melalui penelusuran Live WHOIS API. Jika hasil pencatatan menunjukkan data registrasi domain disembunyikan oleh pemilik, menggunakan proksi privat, atau server tidak memberikan respons valid, maka entitas dialihkan ke kesimpulan akhir.
                            <\/li>
                        <\/ul>
                    <\/li>
                    <li>
                        <strong>Keputusan Definitif (Leaf Node):<\/strong> Atas dasar akumulasi pembobotan vektor di atas, aturan C4.5 secara mutlak menetapkan bahwa objek investigasi dikategorikan ke dalam kelas <strong>${lastScanData.prediction.toUpperCase()}<\/strong> dengan bobot keyakinan penuh (${lastScanData.confidence}).
                    <\/li>
                <\/ul>

                <h2>IV. Analisis Parameter Topologi Web (Explainable AI)<\/h2>
                <p>Kerangka forensik SafeGuard Pro Suite memetakan karakteristik struktural objek berdasarkan 30 atribut topologi web. Untuk dokumen ilmiah ini, pembahasan difokuskan pada empat pilar parameter dominan yang menjadi indikator utama terjadinya rekayasa sosial digital:<\/p>
                
                <table>
                    <thead>
                        <tr>
                            <th style="width: 20%;">Kode<\/th>
                            <th style="width: 25%;">Nama Parameter<\/th>
                            <th style="width: 25%;">Nilai Vektor<\/th>
                            <th style="width: 30%;">Keterangan & Dampak<\/th>
                        <\/tr>
                    <\/thead>
                    <tbody>
                        <tr>
                            <td style="font-family: 'Courier New', Courier, monospace;">F_01<\/td>
                            <td>SSLfinal_State<\/td>
                            <td style="font-weight: bold;">${isPhish ? 'HTTP / Invalid' : 'Valid HTTPS'}<\/td>
                            <td>Situs beroperasi ${isPhish ? 'tanpa enkripsi hulu ke hilir yang sah. Data kredensial dikirim secara transparan.' : 'dengan enkripsi hulu ke hilir yang sah.'}<\/td>
                        <\/tr>
                        <tr>
                            <td style="font-family: 'Courier New', Courier, monospace;">F_07<\/td>
                            <td>URL_Length<\/td>
                            <td style="font-weight: bold;">${isPhish ? 'Suspicious (>75)' : 'Normal'}<\/td>
                            <td>Panjang string URL ${isPhish ? 'di luar batas wajar, mengindikasikan adanya injeksi kata kunci palsu.' : 'berada di dalam batas wajar.'}<\/td>

    function saveScanToLocalStorage(url, prediction, confidence, rules) {
        let history = JSON.parse(localStorage.getItem('safeguard_history')) || [];
        const timestamp = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        const newRecord = { url, prediction, confidence, rules: rules || [], time: timestamp };
        history.unshift(newRecord);
        if (history.length > 50) history = history.slice(0, 50);
        localStorage.setItem('safeguard_history', JSON.stringify(history));
        renderScanHistory();
    }

    function renderScanHistory() {
        const historyBody = document.getElementById('historyBody');
        let history = JSON.parse(localStorage.getItem('safeguard_history')) || [];
        if (history.length === 0) {
            historyBody.innerHTML = `<tr><td colspan="4" style="color: var(--text-muted); text-align: center; padding: 20px;">Belum ada aktivitas pemindaian.<\/td><\/tr>`;
            return;
        }
        historyBody.innerHTML = '';
        history.forEach(item => {
            const statusClass = item.prediction === 'Phishing' ? 'hist-status-phish' : 'hist-status-secure';
            const icon = item.prediction === 'Phishing' ? '<i class="fa-solid fa-radiation"><\/i>' : '<i class="fa-solid fa-shield-check"><\/i>';
            historyBody.innerHTML += `
                <tr>
                    <td class="hist-url" title="${item.url}">${item.url}<\/td>
                    <td class="${statusClass}">${icon} ${item.prediction.toUpperCase()}<\/td>
                    <td style="font-family: 'Fira Code', monospace; color: var(--primary);">${item.confidence}<\/td>
                    <td style="color: var(--text-muted); font-size: 12px;">${item.time}<\/td>
                <\/tr>
            `;
        });
    }

    function clearHistory() {
        if (confirm('Hapus seluruh riwayat audit? Tindakan ini tidak dapat dibatalkan.')) {
            localStorage.removeItem('safeguard_history');
            renderScanHistory();
        }
    }
</script>
